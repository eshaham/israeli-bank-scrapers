name: Release
on:
  push:
    branches:
      - master
      - next
jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      id-token: write
      contents: write
      issues: write
      pull-requests: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # semantic-release needs full history and tags to compute the next version from the last release tag.
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org/
      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest
      - name: Verify npm authentication
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN is missing in the npm-publish environment. GitHub releases will succeed but npm will stay behind."
            exit 1
          fi
          # setup-node@v4 writes an .npmrc with _authToken=${NODE_AUTH_TOKEN}, so whoami works only after that step.
          npm whoami
      - name: Verify npm version
        run: |
          echo "Node version: $(node -v)"
          echo "npm version: $(npm -v)"
          npm config list
      - name: prepare default version
        run: npm run prepare:default
      - name: Release to Github
        uses: cycjimmy/semantic-release-action@v4
        id: semantic   # Need an `id` for output variables
        with:
          semantic_version: 16.0.2
          # Commit version bumps to the branch (npm plugin alone does not push); keep lockfile in sync.
          extra_plugins: |
            @semantic-release/git
          branches: |
            [
              '+([0-9])?(.{+([0-9]),x}).x',
              'master',
              'next',
              'next-major',
              {
                name: 'hotfix',
                prerelease: true
              },
              {
                name: 'beta',
                prerelease: true
              },
              {
                name: 'alpha',
                prerelease: true
              }
            ]
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Prepare release of default to NPM
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          node utils/pre-publish.js --version ${{ steps.semantic.outputs.new_release_version }}
      # Provenance via GitHub OIDC can conflict with classic/granular NPM_TOKEN publishes (npm may return E404).
      # Disable automatic provenance for token-based publish; re-enable Trusted Publishing on npmjs if you want OIDC-only.
      - name: Publish default package to npm
        if: steps.semantic.outputs.new_release_published == 'true'
        run: npm publish --access public --ignore-scripts
        env:
          NPM_CONFIG_PROVENANCE: "false"
      # NOTE: This fork no longer publishes the unscoped `israeli-bank-scrapers-core` package.
      # The core publish flow targeted upstream's package name (already at 6.7.4) and would either
      # collide with upstream's release line or be rejected by npm because 1.0.x < 6.7.4. If a core
      # variant is ever needed for this fork, publish it under the @hirez10 scope instead and
      # restore dedicated steps here.
